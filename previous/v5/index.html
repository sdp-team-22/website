<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="user-box">
                <input type="text" id="username" name="username" required>
                <label>Username</label>
            </div>
            <div class="user-box">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
            </div>
            <div class="user-box">
                <span id="Error" class="error-message"></span>
            </div>
            <a href="#" id="submitBtn" class="submit-link">Submit</a>
        </form>
        <a href="#" class="pass-forgot">Forgot your password?</a>
    </div>

    <div id="mainContent" style="display: none;">
        <div id="content-selector">
            <div class="page-button" onclick="showStatisticsPage()">
                General Website Statistics
            </div>
            <div class="page-button" onclick="showInputPage()">
                Input Data
            </div>
            <div class="page-button" onclick="showSearchPage()">
                Search and View Data
            </div>
        </div>
        <div id="statistics-page" class="page" style="display:block;">
            <div class="important-text">
                Statistics
            </div>
            <div class="content">
                
            </div>
        </div>
        <div id="input-page" class="page" style="display:none;">
            <div class="important-text">
                Input Data
            </div>
            <div class="content">
                <form>
                    <input type="file" accept=".xlsx, .csv" multiple>
                    <input type="button" onclick="parseFiles()" value="Upload Data">
                </form>
            </div>
        </div>
        <div id="search-page" class="page" style="display:none;">
            <div class="important-text">
                Database Search
            </div>
            <div class="content">
                <div id="normal-search-form"></div>
                <div id="advanced-search-form"></div>
                <script src="assets/js/build-search.js"></script>
            </div>
        </div>
    </div>
</body>
<script src="assets/js/main.js"></script>
</html>
